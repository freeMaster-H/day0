<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
        }

        .sidebar {
            width: 260px;
            background-color: rgba(15, 23, 42, 0.9);
            border-right: 1px solid rgba(96, 165, 250, 0.2);
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .sidebar-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-item {
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .file-item:hover {
            background-color: rgba(96, 165, 250, 0.15);
            color: #60a5fa;
            transform: translateX(4px);
        }
        
        .file-icon {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        h1 {
            font-size: 6rem;
            color: #60a5fa;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.4), 0 0 40px rgba(96, 165, 250, 0.2);
            text-align: center;
            margin: 0;
            padding: 3rem 5rem;
            background-color: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 3rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(96, 165, 250, 0.1);
            backdrop-filter: blur(12px);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(96, 165, 250, 0.1); }
            50% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(96, 165, 250, 0.3); }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-title">Project</div>
        <ul class="file-list">
            <li class="file-item">
                <span class="file-icon">📁</span>
                .git
            </li>
            <li class="file-item">
                <span class="file-icon">📄</span>
                index.html
            </li>
        </ul>
    </div>
    <div class="main-content">
        <h1>내 첫번째 아이디어</h1>
    </div>
</body>
</html>
