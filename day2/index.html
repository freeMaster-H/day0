<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 서비스 - 오늘도 힘내세요</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="icon-lightning">
                <path d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            나의 첫 서비스
        </h1>
        <nav>
            <a href="#intro">소개</a>
            <a href="#features">기능</a>
            <a href="#contact">문의</a>
        </nav>
    </header>
    <main>
        <!-- 핵심 기능 소개 섹션 -->
        <section class="section-container">
            <h2 class="section-title">핵심 기능 소개</h2>
            <div class="card">
                <h3 id="sentence">오늘도 힘내세요</h3>
                <p id="preview"></p>
                <button id="next-btn" onclick="nextSentence()">다음 문장 보기</button>
            </div>
        </section>

        <!-- 사용자 후기 섹션 -->
        <section class="section-container">
            <h2 class="section-title">사용자 후기</h2>
            <div class="reviews-list">
                <div class="review-card">
                    <img src="./assets/avatar1.png" alt="김민수 프로필" class="profile-img">
                    <div class="review-content">
                        <div class="user-info">
                            <span class="user-name">김민수</span>
                            <span class="user-rating">★★★★★</span>
                        </div>
                        <p class="review-text">"매일 아침마다 새로운 긍정적인 문장을 보며 하루를 시작하는데, 정말 큰 위로와 힘이 됩니다. UI도 너무 깔끔하네요!"</p>
                    </div>
                </div>
                <div class="review-card">
                    <img src="./assets/avatar2.png" alt="이지현 프로필" class="profile-img">
                    <div class="review-content">
                        <div class="user-info">
                            <span class="user-name">이지현</span>
                            <span class="user-rating">★★★★★</span>
                        </div>
                        <p class="review-text">"지치고 힘들 때 우연히 접속해서 문장을 넘겨봤는데 마음이 편안해졌어요. 주변 친구들에게도 추천했습니다!"</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div>ⓒ 2026</div>
    </footer>

    <script>
        const sentences = [
            "오늘도 힘내세요",
            "당신은 할 수 있습니다 💪",
            "작은 한 걸음이 큰 변화를 만듭니다",
            "포기하지 마세요, 거의 다 왔어요 🌟",
            "오늘 하루도 수고 많으셨습니다",
            "내일은 더 나은 하루가 될 거예요 ☀️",
            "지금 이 순간, 최선을 다하고 있습니다",
        ];

        // 각 문장마다 고유 색상 (현재 문장용, 테마에 어울리는 초록/에메랄드/테일 계열)
        const colors = [
            { text: '#0d9488', glow: 'rgba(13, 148, 136, 0.15)' },   // 테일
            { text: '#065f46', glow: 'rgba(6, 95, 70, 0.15)' },     // 깊은 에메랄드
            { text: '#15803d', glow: 'rgba(21, 128, 61, 0.15)' },    // 포레스트 그린
            { text: '#0f766e', glow: 'rgba(15, 118, 110, 0.15)' },   // 오션 테일
            { text: '#047857', glow: 'rgba(4, 120, 87, 0.15)' },     // 에메랄드 그린
            { text: '#166534', glow: 'rgba(22, 101, 52, 0.15)' },    // 다크 그린
            { text: '#0369a1', glow: 'rgba(3, 105, 161, 0.15)' },    // 청록색 계열 스카이 블루
        ];

        let currentIndex = 0;

        function applyCurrentColor(index) {
            const h1 = document.getElementById('sentence');
            const c = colors[index];
            h1.style.color = c.text;
            h1.style.textShadow = `0 2px 10px ${c.glow}`;
        }

        function applyNextColor(nextIndex) {
            const preview = document.getElementById('preview');
            const tc = colors[nextIndex];

            preview.style.color = tc.text;
        }

        function updatePreview() {
            const nextIndex = (currentIndex + 1) % sentences.length;
            document.getElementById('preview').textContent = sentences[nextIndex];
            applyNextColor(nextIndex);
        }

        function nextSentence() {
            const el = document.getElementById('sentence');
            const preview = document.getElementById('preview');
            el.classList.add('fade');
            preview.style.opacity = '0';

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % sentences.length;
                el.textContent = sentences[currentIndex];
                el.classList.remove('fade');
                applyCurrentColor(currentIndex);
                updatePreview();
                preview.style.opacity = '1';
            }, 400);
        }

        // 초기 적용
        applyCurrentColor(currentIndex);
        updatePreview();
    </script>
</body>

</html>
