<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 서비스 - 오늘도 힘내세요</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>나의 첫 서비스</h1>
        <nav>
            <a href="#intro">소개</a>
            <a href="#features">기능</a>
            <a href="#contact">문의</a>
        </nav>
    </header>
    <main>
        <!-- 핵심 기능 소개 섹션 -->
        <section class="section-container">
            <h2 class="section-title">핵심 기능 소개</h2>
            <div class="card">
                <h3 id="sentence">오늘도 힘내세요</h3>
                <p id="preview"></p>
                <button id="next-btn" onclick="nextSentence()">다음 문장 보기</button>
            </div>
        </section>

        <!-- 사용자 후기 섹션 -->
        <section class="section-container">
            <h2 class="section-title">사용자 후기</h2>
            <div class="reviews-list">
                <div class="review-card">
                    <img src="./assets/avatar1.png" alt="김민수 프로필" class="profile-img">
                    <div class="review-content">
                        <div class="user-info">
                            <span class="user-name">김민수</span>
                            <span class="user-rating">★★★★★</span>
                        </div>
                        <p class="review-text">"매일 아침마다 새로운 긍정적인 문장을 보며 하루를 시작하는데, 정말 큰 위로와 힘이 됩니다. UI도 너무 깔끔하네요!"</p>
                    </div>
                </div>
                <div class="review-card">
                    <img src="./assets/avatar2.png" alt="이지현 프로필" class="profile-img">
                    <div class="review-content">
                        <div class="user-info">
                            <span class="user-name">이지현</span>
                            <span class="user-rating">★★★★★</span>
                        </div>
                        <p class="review-text">"지치고 힘들 때 우연히 접속해서 문장을 넘겨봤는데 마음이 편안해졌어요. 주변 친구들에게도 추천했습니다!"</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div>ⓒ 2026</div>
    </footer>

    <script>
        const sentences = [
            "오늘도 힘내세요",
            "당신은 할 수 있습니다 💪",
            "작은 한 걸음이 큰 변화를 만듭니다",
            "포기하지 마세요, 거의 다 왔어요 🌟",
            "오늘 하루도 수고 많으셨습니다",
            "내일은 더 나은 하루가 될 거예요 ☀️",
            "지금 이 순간, 최선을 다하고 있습니다",
        ];

        // 각 문장마다 고유 색상 (현재 문장용)
        const colors = [
            { text: '#e0f2fe', glow: 'rgba(224, 242, 254, 0.7)' },   // 하늘
            { text: '#a5f3fc', glow: 'rgba(165, 243, 252, 0.7)' },   // 시안
            { text: '#c4b5fd', glow: 'rgba(196, 181, 253, 0.7)' },   // 보라
            { text: '#86efac', glow: 'rgba(134, 239, 172, 0.7)' },   // 초록
            { text: '#fde68a', glow: 'rgba(253, 230, 138, 0.7)' },   // 노랑
            { text: '#fdba74', glow: 'rgba(253, 186, 116, 0.7)' },   // 오렌지
            { text: '#f9a8d4', glow: 'rgba(249, 168, 212, 0.7)' },   // 핑크
        ];

        // 버튼·미리보기용 배경/글씨 색 (다음 문장 색과 동일)
        const btnColors = [
            { bg: 'linear-gradient(135deg, #0ea5e9, #38bdf8)', shadow: 'rgba(56,189,248,0.55)' },
            { bg: 'linear-gradient(135deg, #06b6d4, #22d3ee)', shadow: 'rgba(34,211,238,0.55)' },
            { bg: 'linear-gradient(135deg, #7c3aed, #a78bfa)', shadow: 'rgba(167,139,250,0.55)' },
            { bg: 'linear-gradient(135deg, #16a34a, #4ade80)', shadow: 'rgba(74,222,128,0.55)' },
            { bg: 'linear-gradient(135deg, #d97706, #fbbf24)', shadow: 'rgba(251,191,36,0.55)' },
            { bg: 'linear-gradient(135deg, #ea580c, #fb923c)', shadow: 'rgba(251,146,60,0.55)' },
            { bg: 'linear-gradient(135deg, #db2777, #f472b6)', shadow: 'rgba(244,114,182,0.55)' },
        ];

        let currentIndex = 0;

        function applyCurrentColor(index) {
            const h1 = document.getElementById('sentence');
            const c = colors[index];
            h1.style.color = c.text;
            h1.style.textShadow = `0 0 20px ${c.glow}, 0 0 40px ${c.glow}`;
        }

        function applyNextColor(nextIndex) {
            const btn = document.getElementById('next-btn');
            const preview = document.getElementById('preview');
            const bc = btnColors[nextIndex];
            const tc = colors[nextIndex];

            btn.style.background = bc.bg;
            btn.style.boxShadow = `0 4px 20px ${bc.shadow}`;
            preview.style.color = tc.text;
        }

        function updatePreview() {
            const nextIndex = (currentIndex + 1) % sentences.length;
            document.getElementById('preview').textContent = sentences[nextIndex];
            applyNextColor(nextIndex);
        }

        function nextSentence() {
            const el = document.getElementById('sentence');
            const preview = document.getElementById('preview');
            el.classList.add('fade');
            preview.style.opacity = '0';

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % sentences.length;
                el.textContent = sentences[currentIndex];
                el.classList.remove('fade');
                applyCurrentColor(currentIndex);
                updatePreview();
                preview.style.opacity = '1';
            }, 400);
        }

        // 초기 적용
        applyCurrentColor(currentIndex);
        updatePreview();
    </script>
</body>

</html>
